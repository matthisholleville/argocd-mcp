name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build chart dependencies
        run: helm dependency build charts/argocd-mcp

      - name: Lint chart
        run: helm lint charts/argocd-mcp --set argocd.baseURL=https://argocd.example.com --set argocd.token=test

  helm-push-dev:
    runs-on: ubuntu-latest
    needs: [build, lint, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: helm-push
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build chart dependencies
        run: helm dependency build charts/argocd-mcp

      - name: Package dev chart
        run: |
          SHA="${{ github.sha }}"
          sed -i "s/^version:.*/version: 0.0.0-dev-${SHA::8}/" charts/argocd-mcp/Chart.yaml
          helm package charts/argocd-mcp

      - name: Push dev chart to GHCR
        run: |
          SHA="${{ github.sha }}"
          helm push argocd-mcp-0.0.0-dev-${SHA::8}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  docker:
    runs-on: ubuntu-latest
    needs: [build, lint, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          build-args: |
            VERSION=dev-${{ github.sha }}
