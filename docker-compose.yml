services:

  ollama:
    image: ollama/ollama:latest
    container_name: argocd-mcp-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: argocd-mcp-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: no

  argocd-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argocd-mcp
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8086:8080"
    environment:
      - MCP_TRANSPORT=http
      - MCP_ADDR=:8080
      - ARGOCD_BASE_URL=${ARGOCD_BASE_URL}
      - ARGOCD_TOKEN=${ARGOCD_TOKEN:-}
      - ARGOCD_SPEC_URL=${ARGOCD_SPEC_URL:-}
      - AUTH_MODE=${AUTH_MODE:-token}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8086}
      - DEX_CLIENT_ID=${DEX_CLIENT_ID:-argo-cd-cli}
      - ARGOCD_TLS_INSECURE=${ARGOCD_TLS_INSECURE:-true}
      - DISABLE_WRITE=${DISABLE_WRITE:-false}
      - ALLOWED_RESOURCES=${ALLOWED_RESOURCES:-}
      - AUDIT_LOG=${AUDIT_LOG:-true}
      - EMBEDDINGS_ENABLED=true
      - OLLAMA_URL=http://ollama:11434/api
      - EMBEDDINGS_MODEL=nomic-embed-text
    restart: unless-stopped

volumes:
  ollama_data:
