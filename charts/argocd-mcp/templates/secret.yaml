{{- if and (eq .Values.auth.mode "token") (not .Values.argocd.existingSecret) .Values.argocd.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argocd-mcp.fullname" . }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  argocd-token: {{ .Values.argocd.token | b64enc | quote }}
{{- end }}
